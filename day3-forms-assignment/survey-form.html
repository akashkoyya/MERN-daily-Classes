<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Survey Form</h1>
    <form>
            <label for="name">UserName:</label>
            <input type="text" id="name" name="name" required><br><br><br>
            <label for="feedback">Feedback:</label>
            <textarea id="feedback" name="feedback" rows="4" cols="50" required></textarea><br><br><br>
            <label for="rating">Rating:</label>
            <input type="range" id="rating" name="rating" value="1" min="1" max="5" required><br><br><br>
            <label for="favourite technology">Favourite Technology:</label>
            <select>
                <option value="none">Select an option</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
            </select>
            <br><br><br>
            <label for="subscribe">Subscribe:</label>
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Yes, I want to subscribe .</label><br><br><br>
            <button type="submit">Submit</button>

    </form>
</body>
</html>
