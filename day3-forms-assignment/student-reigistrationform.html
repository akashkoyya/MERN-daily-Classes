<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
        <h1>Student Registration Form</h1>
        <label for="Full Name">Full Name:</label>
        <input type="text" id="Full Name" name="Full Name" required minlength="4" maxlength="20" style="width: 200px;"><br><br><br>
        <label for="Email">Email:</label>
        <input type="email" id="Email" name="Email" required minlength="4" maxlength="20" style="width: 200px;"><br><br><br>
        <label for="Password">Password:</label>
        <input type="password" id="Password" name="Password" required minlength="6" maxlength="20" style="width: 200px;"><br><br><br>
        <label for="Confirm Password">Confirm Password:</label>
        <input type="password" id="Confirm Password" name="Confirm Password" required minlength="6" maxlength="20" style="width: 200px;"><br><br>
        <label for="gender">Gender:</label>
        <input type="radio" id="Male" name="gender" value="Male" required> 
        <label for="Male">Male</label>
        <input type="radio" id="Female" name="gender" value="Female" required>  
        <label for="Female">Female</label>
        <input type="radio" id="Other" name="gender" value="Other" required>  
        <label for="Other">Other</label><br><br><br>    
        <label for="hobbies">Hobbies:</label>
        <input type="checkbox" id="hobbies1" name="hobbies" value="Reading">
        <label for="hobbies1">Reading</label>
        <input type="checkbox" id="hobbies2" name="hobbies" value="Traveling">
        <label for="hobbies2">Traveling</label> 
        <input type="checkbox" id="hobbies3" name="hobbies" value="Cooking">
        <label for="hobbies3">Cooking</label><br><br><br>
        <label for="date of birth">Date of Birth:</label>
        <input type="date" id="date of birth" name="date of birth" required><br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        </fieldset>
    
        
    </form>
    
</body>
</html>
